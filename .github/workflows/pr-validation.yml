name: Pull Request Validation

# Reaguj na Pull Requesty do brancha main
on:
  pull_request:
    branches:
      - main

# Uprawnienia dla GITHUB_TOKEN
permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1: Instalacja i linting
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint

  # Job 2: Testy jednostkowe
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit

  # Job 3: Build verification
  build:
    name: Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build

  # Job 4: Testy E2E (opcjonalne - wymaga konfiguracji secrets)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Uruchamiamy E2E tylko jeśli poprzednie joby się powiodły
    needs: [lint, unit-tests, build]
    # Dodaj warunek - E2E testy będą pomijane jeśli nie ma skonfigurowanych secrets
    if: false  # Ustaw na 'true' gdy skonfigurujesz secrets w GitHub
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      
      - name: Run E2E tests (fast suite)
        run: npm run test:e2e:fast
        env:
          CI: true
          # Konfiguruj te secrets w GitHub Settings > Secrets and variables > Actions
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
